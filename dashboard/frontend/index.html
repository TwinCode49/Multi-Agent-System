<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexus Dashboard</title>
  <link rel="stylesheet" href="css/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>
  <header class="topbar">
    <h1>Nexus Dashboard</h1>
    <div class="topbar-meta">
      <span id="currentTime"></span>
      <button id="refreshBtn" onclick="loadAll()">Refresh</button>
    </div>
  </header>

  <main class="container">
    <section class="cards" id="statsCards">
      <div class="card"><div class="card-label">Total Users</div><div class="card-value" id="stat-totalUsers">—</div></div>
      <div class="card"><div class="card-label">Active Users</div><div class="card-value" id="stat-activeUsers">—</div></div>
      <div class="card"><div class="card-label">Revenue</div><div class="card-value" id="stat-totalRevenue">—</div></div>
      <div class="card"><div class="card-label">Orders</div><div class="card-value" id="stat-totalOrders">—</div></div>
      <div class="card"><div class="card-label">Conversion</div><div class="card-value" id="stat-conversionRate">—</div></div>
      <div class="card"><div class="card-label">Avg Order Value</div><div class="card-value" id="stat-avgOrderValue">—</div></div>
    </section>

    <section class="charts-row">
      <div class="chart-box"><canvas id="revenueChart"></canvas></div>
      <div class="chart-box"><canvas id="productsChart"></canvas></div>
    </section>

    <section class="charts-row">
      <div class="chart-box full"><canvas id="growthChart"></canvas></div>
    </section>

    <section class="table-section">
      <h2>Recent Orders</h2>
      <div class="table-controls">
        <select id="pageSize" onchange="loadOrders(1)">
          <option value="5">5</option>
          <option value="10" selected>10</option>
          <option value="20">20</option>
        </select>
        <span id="pageInfo"></span>
        <button onclick="loadOrders(currentPage - 1)" id="prevBtn">Prev</button>
        <button onclick="loadOrders(currentPage + 1)" id="nextBtn">Next</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Order</th><th>Customer</th><th>Product</th><th>Amount</th><th>Status</th><th>Date</th></tr></thead>
          <tbody id="ordersBody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
